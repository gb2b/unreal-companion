id: brainstorming
name: Brainstorming
description: Free-form idea exploration with AI assistance
document:
  template: template.md
  output: '{output_folder}/analysis/brainstorm-{{subject}}-{{date}}.md'
agents:
  primary: game-designer
  alternatives:
  - solo-dev
  - game-architect
  party_mode: true
sections:
- id: start
  name: Start
  required: true
  interaction_types:
  - text
- id: explore
  name: Explore
  required: true
  interaction_types:
  - text
- id: synthesize
  name: Synthesize
  required: false
  interaction_types:
  - text
input_documents:
- type: project_context
  required: false
  auto_fill: true
- type: game_brief
  required: false
  auto_fill: true
briefing: You are helping create a Brainstorming. Fill all required sections by conversing
  with the user. Adapt your approach based on what the user provides.
category: conversation
icon: brain
color: purple
estimated_time: Open-ended
behavior: infinite
ui_visible: true
