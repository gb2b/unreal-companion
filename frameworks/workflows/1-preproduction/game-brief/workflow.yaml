id: game-brief
name: Game Brief
description: Define your game's complete vision and direction
document:
  template: template.md
  output: '{output_folder}/concept/game-brief.md'
agents:
  primary: game-designer
  alternatives:
  - solo-dev
  party_mode: false
sections:
- id: init
  name: Init
  required: true
  interaction_types:
  - text
- id: identity
  name: Identity
  required: true
  interaction_types:
  - text
  - choices
- id: vision
  name: Vision
  required: true
  interaction_types:
  - text
- id: pillars
  name: Pillars
  required: true
  interaction_types:
  - text
- id: references
  name: References
  required: true
  interaction_types:
  - text
- id: audience
  name: Audience
  required: true
  interaction_types:
  - text
- id: scope
  name: Scope
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: false
  auto_fill: true
- type: brainstorms
  required: false
  auto_fill: true
briefing: You are helping create a Game Brief. Fill all required sections by conversing
  with the user. Adapt your approach based on what the user provides.
category: document
icon: target
color: blue
behavior: one-shot
ui_visible: true
suggested_after:
- get-started
- brainstorming
document_order: 1
