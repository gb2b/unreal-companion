id: sprint-planning
name: Sprint Planning
description: Plan your next development sprint with clear, actionable tasks
document:
  template: template.md
  output: '{output_folder}/production/sprint-{{timestamp}}.md'
agents:
  primary: scrum-master
  alternatives: []
  party_mode: false
sections:
- id: context
  name: Context
  required: true
  interaction_types:
  - text
- id: goals
  name: Goals
  required: true
  interaction_types:
  - text
- id: tasks
  name: Tasks
  required: true
  interaction_types:
  - text
- id: prioritize
  name: Prioritize
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: true
  auto_fill: true
- type: game_brief
  required: false
  auto_fill: true
- type: gdd
  required: false
  auto_fill: true
- type: previous_sprints
  required: false
  auto_fill: true
briefing: You are helping create a Sprint Planning. Fill all required sections by
  conversing with the user. Adapt your approach based on what the user provides.
category: agile
icon: calendar
color: blue
estimated_time: 15 min
behavior: repeatable
ui_visible: true
