id: art-direction
name: Art Direction
description: Define your game's visual identity, style, and aesthetics
document:
  template: template.md
  output: '{output_folder}/art/art-direction.md'
agents:
  primary: 3d-artist
  alternatives: []
  party_mode: false
sections:
- id: vision
  name: Vision
  required: true
  interaction_types:
  - text
- id: style
  name: Style
  required: true
  interaction_types:
  - text
- id: color
  name: Color
  required: true
  interaction_types:
  - text
- id: characters
  name: Characters
  required: true
  interaction_types:
  - text
- id: environments
  name: Environments
  required: true
  interaction_types:
  - text
- id: ui
  name: Ui
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: true
  auto_fill: true
- type: game_brief
  required: true
  auto_fill: true
- type: narrative
  required: false
  auto_fill: true
briefing: You are helping create a Art Direction. Fill all required sections by conversing
  with the user. Adapt your approach based on what the user provides.
category: document
icon: palette
color: pink
estimated_time: 45-60 min
behavior: one-shot
ui_visible: true
suggested_after:
- game-brief
document_order: 4
