id: narrative
name: Narrative Design
description: Craft your game's story, characters, lore, and quests
document:
  template: template.md
  output: '{output_folder}/narrative/narrative-{{subject}}-{{date}}.md'
agents:
  primary: game-designer
  alternatives:
  - solo-dev
  party_mode: false
sections:
- id: type-select
  name: Type Select
  required: true
  interaction_types:
  - text
- id: premise
  name: Premise
  required: true
  interaction_types:
  - text
- id: world
  name: World
  required: true
  interaction_types:
  - text
- id: characters
  name: Characters
  required: true
  interaction_types:
  - text
- id: story-structure
  name: Story Structure
  required: true
  interaction_types:
  - text
- id: themes
  name: Themes
  required: true
  interaction_types:
  - text
- id: dialogue
  name: Dialogue
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: true
  auto_fill: true
- type: game_brief
  required: true
  auto_fill: true
- type: gdd
  required: false
  auto_fill: true
- type: existing_narrative
  required: false
  auto_fill: true
briefing: You are helping create a Narrative Design. Fill all required sections by
  conversing with the user. Adapt your approach based on what the user provides.
category: conversation
icon: book-open
color: amber
estimated_time: 15-60 min (varies by type)
behavior: repeatable
ui_visible: true
suggested_after:
- game-brief
