id: audio-design
name: Audio Design
description: Define your game's soundscape, music, and audio experience
document:
  template: template.md
  output: '{output_folder}/audio/audio-direction.md'
agents:
  primary: game-designer
  alternatives: []
  party_mode: false
sections:
- id: vision
  name: Vision
  required: true
  interaction_types:
  - text
- id: music
  name: Music
  required: true
  interaction_types:
  - text
- id: sfx
  name: Sfx
  required: true
  interaction_types:
  - text
- id: voice
  name: Voice
  required: true
  interaction_types:
  - text
- id: implementation
  name: Implementation
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: true
  auto_fill: true
- type: game_brief
  required: true
  auto_fill: true
- type: art_direction
  required: false
  auto_fill: true
briefing: You are helping create a Audio Design. Fill all required sections by conversing
  with the user. Adapt your approach based on what the user provides.
category: document
icon: music
color: violet
estimated_time: 30-45 min
behavior: one-shot
ui_visible: true
suggested_after:
- game-brief
document_order: 5
