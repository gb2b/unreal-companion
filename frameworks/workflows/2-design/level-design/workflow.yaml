id: level-design
name: Level Design
description: Plan your game's levels, progression, and spatial design
document:
  template: template.md
  output: '{output_folder}/design/level-design.md'
agents:
  primary: level-designer
  alternatives: []
  party_mode: false
sections:
- id: structure
  name: Structure
  required: true
  interaction_types:
  - text
- id: progression
  name: Progression
  required: true
  interaction_types:
  - text
  - slider
- id: first-level
  name: First Level
  required: true
  interaction_types:
  - text
- id: pacing
  name: Pacing
  required: true
  interaction_types:
  - text
- id: secrets
  name: Secrets
  required: true
  interaction_types:
  - text
- id: review
  name: Review
  required: false
  interaction_types:
  - text
  - confirm
input_documents:
- type: project_context
  required: true
  auto_fill: true
- type: game_brief
  required: true
  auto_fill: true
- type: gdd
  required: true
  auto_fill: true
- type: narrative
  required: false
  auto_fill: true
briefing: You are helping create a Level Design. Fill all required sections by conversing
  with the user. Adapt your approach based on what the user provides.
category: document
icon: map
color: emerald
estimated_time: 45-60 min
behavior: one-shot
ui_visible: true
suggested_after:
- gdd
document_order: 6
