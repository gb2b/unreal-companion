- id: progression
  name: Progression
  required: true
  interaction_types:
  - text
  - slider
- id: narrative
  name: Narrative
  required: true
  interaction_types:
  - text
  - choices
- id: presentation
  name: Presentation
  required: true
  interaction_types:
  - text
